{{- if or $.Values.web.enabled $.Values.vpn.enabled $.Values.proxy.enabled }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ printf "%s-deployment" .Chart.Name }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app: {{ printf "%s-app" .Chart.Name }}
  template:
    metadata:
      labels:
        app: {{ printf "%s-app" .Chart.Name }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: {{ printf "%s-container" .Chart.Name }}
          image: "{{ $.Values.image.repository }}:{{ $.Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ $.Values.image.pullPolicy }}
          {{- with $.Values.secretRef }}
          envFrom:
            - secretRef:
                name: {{ $.Values.secretRef }}
          {{- end }}
          ports:
            {{- if $.Values.web.enabled }}
            - name: {{ .Values.web.portName }}
              containerPort: {{ .Values.web.targetPort }}
              protocol: {{ .Values.web.protocol }}
            {{- end }}
            {{- if $.Values.vpn.enabled }}
            - name: {{ .Values.vpn.portName }}
              containerPort: {{ .Values.vpn.targetPort }}
              protocol: {{ .Values.vpn.protocol }}
            {{- end }}
            {{- if $.Values.proxy.enabled }}
            - name: {{ .Values.proxy.portName }}
              containerPort: {{ .Values.proxy.targetPort }}
              protocol: {{ .Values.proxy.protocol }}
            {{- end }}
          {{- with .Values.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.volumeMounts }}
          volumeMounts:
            {{- toYaml . | nindent 12 }}
          {{- end }}
      {{- with .Values.volumes }}
      volumes:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
---
{{- end }}
